<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram Digest{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-secondary: #16213e;
            --text: #eee;
            --text-muted: #888;
            --accent: #0f3460;
            --highlight: #e94560;
            --success: #4ecca3;
            --warning: #ffc93c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-secondary);
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent);
        }

        header h1 {
            font-size: 1.8em;
            font-weight: 600;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-right: 20px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            background: var(--accent);
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat {
            background: var(--accent);
            padding: 15px;
            border-radius: 6px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: var(--highlight);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .status-running {
            background: var(--success);
            color: #000;
        }

        .status-paused {
            background: var(--warning);
            color: #000;
        }

        .status-quiet {
            background: var(--accent);
            color: var(--text);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--accent);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8em;
        }

        tr:hover {
            background: var(--accent);
        }

        .digest-content {
            white-space: pre-wrap;
            font-family: inherit;
            background: var(--bg);
            padding: 15px;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
        }

        .truncate {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .time-ago {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms;
        }

        .htmx-request .htmx-indicator {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Telegram Digest</h1>
            <nav>
                <a href="/" {% if active_page == 'home' %}class="active"{% endif %}>Dashboard</a>
                <a href="/digests" {% if active_page == 'digests' %}class="active"{% endif %}>Digests</a>
                <a href="/qa" {% if active_page == 'qa' %}class="active"{% endif %}>Q&A Pairs</a>
                <a href="/suggestions" {% if active_page == 'suggestions' %}class="active"{% endif %}>Suggestions</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
